<!DOCTYPE html>
<html>
<head>
  <title>Mini Online Store</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      display: flex;
      min-height: 80vh;
    }

    /* SIDEBAR - STUDENT 1 */
    .sidebar {
      width: 200px;
      background: #444;
      color: white;
      padding: 15px;
    }

    .sidebar ul {
      list-style: none;
      padding: 0;
    }

    .sidebar li {
      padding: 8px 0;
    }

    .content {
      flex: 1;
      padding: 20px;
      background: #f4f4f4;
    }

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
    }
  </style>
</head>
<body>

<header>
  <h1>Mini Online Store</h1>
</header>

<div class="container">

  <!-- STUDENT 1 FEATURE -->
  <div class="sidebar">
    <h3>Categories</h3>
    <ul>
      <li>Clothes</li>
      <li>Shoes</li>
      <li>Bags</li>
      <li>Accessories</li>
    </ul>
  </div>

  <!-- EMPTY CONTENT (for Student 2) -->
  <div class="content">
   <h2>Products are not available right now because the owner is in a vacation.</h2>
    <h2>See you next time! Thankyou.</h2>
  </div>

</div>

<footer>
  <p>© 2026 Mini Online Store</p>
</footer>

</body>
</html>
